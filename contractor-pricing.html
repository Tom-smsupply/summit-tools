<script>
// ... (Auth logic remains unchanged) ...

function doSearch() {
  const raw = searchInput.value.trim();
  if (!raw) {
    resultsDiv.innerHTML = '';
    resultsCount.textContent = '';
    resultsNote.textContent = '';
    showPrompt();
    return;
  }

  const normalizedQuery = normalize(raw);
  const tokens = normalizedQuery.split(' ').filter(t => t.length >= 1);
  const queryWords = raw.toLowerCase().split(' ').filter(w => w.length >= 1);
  const selectedColor = colorFilter.value;
  
  let matches = PRODUCTS.filter(p => scoreMatch(tokens, p.search));
  if (selectedColor) {
    matches = matches.filter(p => p.name.includes(selectedColor));
  }

  resultsCount.textContent = matches.length + ' result' + (matches.length !== 1 ? 's' : '');
  resultsNote.textContent = matches.length > 50 ? '(Showing first 80 — refine your search)' : '';

  const display = matches.slice(0, 80);
  const addedIds = new Set(quote.map(q => q.id));

  if (display.length === 0) {
    resultsDiv.innerHTML = `<div class="no-results"><div class="nr-icon">🔎</div><p>No products found for "<strong>${escapeHtml(raw)}</strong>".<br>Try different keywords.</p></div>`;
    return;
  }

  resultsDiv.innerHTML = display.map((p, i) => {
    const idx = PRODUCTS.indexOf(p);
    const isAdded = addedIds.has(idx);
    return `<div class="result-item ${isAdded ? 'already-added' : ''}" onclick="addItem(${idx})">
      <div class="result-name">${highlightText(p.name, queryWords)}</div>
      <div class="result-right">
        <div class="result-price">$${p.price.toFixed(2)}</div>
        <button class="add-btn" title="${isAdded ? 'Tap to remove' : 'Add to quote'}">${isAdded ? '✓' : '+'}</button>
      </div>
    </div>`;
  }).join('');
}

function addItem(productIdx) {
  const existingIdx = quote.findIndex(q => q.id === productIdx);
  if (existingIdx !== -1) {
    quote.splice(existingIdx, 1);
    renderQuote();
    doSearch();
    return;
  }
  const p = PRODUCTS[productIdx];
  quote.push({ id: productIdx, name: p.name, price: p.price, qty: 1 });
  renderQuote();
  
  // Clear search after adding
  searchInput.value = '';
  doSearch();

  const rightPanel = document.querySelector('.right-panel');
  if (rightPanel && window.innerWidth <= 700) {
    rightPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ... (Rest of the file remains exactly as provided) ...
</script>
